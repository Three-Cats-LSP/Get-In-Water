name: Build Get In Water APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'Android Apk/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-get-in-water
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Run audit checks
        run: npm run test:audit

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
            echo "google-services.json installed from secret"
          else
            echo "GOOGLE_SERVICES_JSON secret not set — skipping (Google Sign-In will not work in APK)"
          fi

      - name: Generate Android launcher icons
        run: |
          sudo apt-get install -y --no-install-recommends imagemagick
          # Use ImageMagick to resize icon-512v2.png
          # into all required mipmap densities for ic_launcher and ic_launcher_foreground.
          # Foreground uses the full icon; background color is set via values/ic_launcher_background.xml.
          declare -A sizes=(
            [mdpi]=48
            [hdpi]=72
            [xhdpi]=96
            [xxhdpi]=144
            [xxxhdpi]=192
          )
          declare -A fg_sizes=(
            [mdpi]=108
            [hdpi]=162
            [xhdpi]=216
            [xxhdpi]=324
            [xxxhdpi]=432
          )
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            dir="android/app/src/main/res/mipmap-${density}"
            sz=${sizes[$density]}
            fgsz=${fg_sizes[$density]}
            convert icon-512v2.png -resize "${sz}x${sz}" "${dir}/ic_launcher.png"
            convert icon-512v2.png -resize "${sz}x${sz}" "${dir}/ic_launcher_round.png"
            convert icon-512v2.png -resize "${fgsz}x${fgsz}" "${dir}/ic_launcher_foreground.png"
          done

      - name: Prepare www folder
        run: npm run prepare:www

      - name: Capacitor sync
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Commit APK to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p "Android Apk"
          cp "${{ steps.find_apk.outputs.apk_path }}" "Android Apk/Get-In-Water.apk"
          git add "Android Apk/Get-In-Water.apk"
          git diff --cached --quiet && echo "No APK changes" && exit 0
          git commit -m "build: update Get-In-Water.apk [skip ci]"
          git reset --hard HEAD
          git pull --rebase origin main
          git push

      - name: Notify homepage to sync APK
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Three-Cats-LSP/threecats-lsp.com/dispatches \
            -d '{"event_type":"sync-apk-get-in-water"}'
