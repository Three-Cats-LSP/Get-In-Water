name: Build Get In Water APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'Android Apk/**'
      - 'README.md'
      - 'icon-*.png'
      - 'App Icon/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-get-in-water
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Run audit checks
        run: npm run test:audit

      - name: Write Firebase web config
        env:
          FIREBASE_WEB_CONFIG: ${{ secrets.FIREBASE_WEB_CONFIG }}
        run: npm run write:firebase-config

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
            echo "google-services.json installed from secret"
          else
            echo "GOOGLE_SERVICES_JSON secret not set — skipping (Google Sign-In will not work in APK)"
          fi

      - name: Generate Android launcher icons
        run: |
          sudo apt-get install -y --no-install-recommends imagemagick
          # Use ImageMagick to resize icon-512v2.png
          # into all required mipmap densities for ic_launcher and ic_launcher_foreground.
          # Foreground uses the full icon; background color is set via values/ic_launcher_background.xml.
          declare -A sizes=(
            [mdpi]=48
            [hdpi]=72
            [xhdpi]=96
            [xxhdpi]=144
            [xxxhdpi]=192
          )
          declare -A fg_sizes=(
            [mdpi]=108
            [hdpi]=162
            [xhdpi]=216
            [xxhdpi]=324
            [xxxhdpi]=432
          )
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            dir="android/app/src/main/res/mipmap-${density}"
            sz=${sizes[$density]}
            fgsz=${fg_sizes[$density]}
            convert icon-512v2.png -resize "${sz}x${sz}" "${dir}/ic_launcher.png"
            convert icon-512v2.png -resize "${sz}x${sz}" "${dir}/ic_launcher_round.png"
            convert icon-512v2.png -resize "${fgsz}x${fgsz}" "${dir}/ic_launcher_foreground.png"
          done

      - name: Prepare www folder
        run: npm run prepare:www

      - name: Capacitor sync
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Install debug keystore
        env:
          ANDROID_DEBUG_KEYSTORE: ${{ secrets.ANDROID_DEBUG_KEYSTORE }}
        run: |
          mkdir -p "$HOME/.android" "$HOME/.config/.android"
          KEYSTORE_CONFIG="$HOME/.config/.android/debug.keystore"
          KEYSTORE_ANDROID="$HOME/.android/debug.keystore"
          if [ -n "$ANDROID_DEBUG_KEYSTORE" ]; then
            echo "$ANDROID_DEBUG_KEYSTORE" | base64 -d > "$KEYSTORE_CONFIG"
            cp "$KEYSTORE_CONFIG" "$KEYSTORE_ANDROID"
            echo "Restored debug keystore from ANDROID_DEBUG_KEYSTORE secret"
          elif [ ! -f "$KEYSTORE_CONFIG" ]; then
            keytool -genkey -v -keystore "$KEYSTORE_CONFIG" \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            cp "$KEYSTORE_CONFIG" "$KEYSTORE_ANDROID"
            echo "Generated new debug keystore (save as ANDROID_DEBUG_KEYSTORE secret to keep SHA-1 stable)"
          fi
          echo "KEYSTORE_PATH=$KEYSTORE_CONFIG" >> "$GITHUB_ENV"

      - name: Build debug APK
        working-directory: android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Print debug SHA-1 for Firebase
        working-directory: android
        run: |
          echo "=== Copy this SHA1 line into Firebase → Project settings → Android app → Add fingerprint ==="
          ./gradlew :app:signingReport --no-daemon 2>&1 | tee /tmp/signing-report.txt
          SHA1_LINE=$(grep "SHA1" /tmp/signing-report.txt | head -1 || true)
          if [ -n "$SHA1_LINE" ]; then
            echo "$SHA1_LINE"
          else
            echo "SHA1 not found in signing report — check /tmp/signing-report.txt in logs above"
          fi

      - name: Upload debug keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-keystore
          path: ${{ env.KEYSTORE_PATH }}
          retention-days: 7
          if-no-files-found: warn

      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "${{ steps.find_apk.outputs.apk_path }}" /tmp/Get-In-Water.apk
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest \
              --title "Latest Android APK" \
              --notes "Debug APK built by CI. Download: https://threecats-lsp.com/get-in-water/download.html" \
              --latest
          gh release upload latest /tmp/Get-In-Water.apk --clobber
