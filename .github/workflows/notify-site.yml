name: Notify Site on Push

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'sw.js'
      - 'sync.js'
      - 'firebase-config.example.js'
      - 'backup-sanitize.js'
      - 'icon-192.png'
      - 'icon-512.png'
      - 'icon-192-light.png'
      - 'icon-512-light.png'
      - 'vendor/**'
      - 'capacitor-bridge.js'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger site sync
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Three-Cats-LSP/threecats-lsp.com/dispatches \
            -d '{"event_type":"sync-get-in-water"}'
